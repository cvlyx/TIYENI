build:
  name: Preview Android APK
  steps:
    - eas/use_npm_token
    - run:
        name: Install dependencies
        working_directory: artifacts/tiyeni
        command: |
          npm install --legacy-peer-deps
          set-env EAS_BUILD_WORKINGDIR /home/expo/workingdir/build/artifacts/tiyeni
    - eas/prebuild
    - eas/inject_android_credentials
    - eas/configure_eas_update
    - eas/configure_android_version
    - eas/run_gradle
    - eas/find_and_upload_build_artifacts

build:
  name: Preview Android APK
  steps:
    - eas/checkout
    - run:
        name: Debug environment
        command: |
          pwd
          echo "Build dir contents:"
          ls -la
          echo "Checking for artifacts/tiyeni:"
          if [ -d artifacts/tiyeni ]; then
            echo "✓ artifacts/tiyeni exists"
            ls -la artifacts/tiyeni/ | head -20
          else
            echo "✗ artifacts/tiyeni NOT FOUND"
            echo "Available directories:"
            find . -maxdepth 2 -type d
          fi
    - eas/use_npm_token
    - run:
        name: Install dependencies
        working_directory: artifacts/tiyeni
        command: npm install --legacy-peer-deps
    - eas/prebuild
    - eas/inject_android_credentials
    - eas/configure_eas_update
    - eas/configure_android_version
    - eas/run_gradle
    - eas/find_and_upload_build_artifacts
